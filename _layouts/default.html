<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <style>
    :root {
      --color-primary: #0A84FF;
      --color-bg: #FFFFFF;
      --color-bg-alt: #F5F5F7;
      --color-text: #1D1D1F;
      --color-text-secondary: #6E6E73;
      --color-border: #D2D2D7;
      --color-accent: #30D158;
      --max-width: 720px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg: #000000;
        --color-bg-alt: #1C1C1E;
        --color-text: #F5F5F7;
        --color-text-secondary: #A1A1A6;
        --color-border: #38383A;
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    header {
      border-bottom: 1px solid var(--color-border);
      padding: 16px 24px;
      position: sticky;
      top: 0;
      background: var(--color-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 100;
    }

    nav {
      max-width: var(--max-width);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    nav .site-title {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--color-text);
      text-decoration: none;
    }

    nav .nav-links {
      display: flex;
      gap: 24px;
    }

    nav .nav-links a {
      color: var(--color-primary);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
    }

    nav .nav-links a:hover {
      text-decoration: underline;
    }

    main {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }

    h2 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-top: 40px;
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }

    h3 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-top: 24px;
      margin-bottom: 8px;
    }

    p {
      margin-bottom: 16px;
      color: var(--color-text);
    }

    ul, ol {
      margin-bottom: 16px;
      padding-left: 24px;
    }

    li {
      margin-bottom: 6px;
    }

    a {
      color: var(--color-primary);
    }

    .hero {
      text-align: center;
      padding: 48px 0 32px;
    }

    .hero h1 {
      font-size: 2.4rem;
      margin-bottom: 8px;
    }

    .hero .tagline {
      font-size: 1.2rem;
      color: var(--color-text-secondary);
      margin-bottom: 24px;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin: 24px 0;
    }

    @media (min-width: 540px) {
      .feature-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .feature-card {
      background: var(--color-bg-alt);
      border-radius: 12px;
      padding: 20px;
      border: 1px solid var(--color-border);
    }

    .feature-card .icon {
      font-size: 1.6rem;
      margin-bottom: 8px;
    }

    .feature-card h3 {
      margin-top: 0;
      font-size: 1rem;
    }

    .feature-card p {
      font-size: 0.9rem;
      color: var(--color-text-secondary);
      margin-bottom: 0;
    }

    .badge-link {
      display: inline-block;
      margin-top: 8px;
    }

    .badge-link img {
      height: 44px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 0.9rem;
    }

    th, td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid var(--color-border);
    }

    th {
      font-weight: 600;
      background: var(--color-bg-alt);
    }

    details {
      background: var(--color-bg-alt);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 12px;
    }

    details summary {
      font-weight: 600;
      cursor: pointer;
      list-style: none;
    }

    details summary::before {
      content: "+ ";
      font-weight: 700;
      color: var(--color-primary);
    }

    details[open] summary::before {
      content: "- ";
    }

    details p {
      margin-top: 8px;
      font-size: 0.9rem;
      color: var(--color-text-secondary);
    }

    footer {
      border-top: 1px solid var(--color-border);
      padding: 24px;
      text-align: center;
      font-size: 0.85rem;
      color: var(--color-text-secondary);
    }

    footer a {
      color: var(--color-text-secondary);
      text-decoration: none;
      margin: 0 12px;
    }

    footer a:hover {
      color: var(--color-primary);
    }

    .last-updated {
      font-size: 0.8rem;
      color: var(--color-text-secondary);
      margin-top: 40px;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="{{ '/' | relative_url }}" class="site-title">PDAI</a>
      <div class="nav-links">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/privacy' | relative_url }}">Privacy</a>
        <a href="{{ '/terms' | relative_url }}">Terms</a>
        <a href="{{ '/support' | relative_url }}">Support</a>
      </div>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>&copy; 2026 PDAI. All rights reserved.</p>
    <p>
      <a href="{{ '/privacy' | relative_url }}">Privacy Policy</a>
      <a href="{{ '/terms' | relative_url }}">Terms of Use</a>
      <a href="{{ '/support' | relative_url }}">Support</a>
    </p>
  </footer>
</body>
</html>
